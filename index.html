<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StormSim Scenario Player</title>
    <style>
      :root {
        --bg: #f4efe6;
        --panel: #fffdf9;
        --line: #d7cbb9;
        --ink: #1f2d2c;
        --muted: #5d6d6b;
        --accent: #1d5c63;
        --accent-soft: #d8ebe7;
        --warn: #8a5a00;
        --warn-soft: #fff3d6;
        --ok: #1f6a43;
        --ok-soft: #dff4e8;
        --shadow: 0 20px 50px rgba(50, 41, 27, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(29, 92, 99, 0.12), transparent 28%),
          linear-gradient(180deg, #f8f3eb 0%, var(--bg) 100%);
      }
      button,
      select,
      textarea {
        font: inherit;
      }
      .shell {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px;
      }
      .hero {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        margin-bottom: 24px;
      }
      .eyebrow {
        margin: 0 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 12px;
        color: var(--muted);
      }
      h1 {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        font-size: clamp(32px, 6vw, 54px);
        line-height: 1.02;
        letter-spacing: -0.02em;
      }
      h2 {
        margin: 0 0 14px;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        font-size: clamp(28px, 4vw, 40px);
        line-height: 1.08;
        letter-spacing: -0.015em;
      }
      blockquote {
        margin: 0;
      }
      h3 {
        margin: 0 0 10px;
        font-size: 18px;
        line-height: 1.2;
      }
      .hero-meta {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 12px;
      }
      .pill {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid var(--line);
        font-size: 14px;
      }
      .layout {
        display: grid;
        grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
        gap: 22px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid rgba(119, 98, 64, 0.16);
        border-radius: 24px;
        box-shadow: var(--shadow);
      }
      .main-card {
        overflow: hidden;
      }
      .node-image {
        width: 100%;
        display: block;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        background: #e6ddd0;
      }
      .node-image-portrait {
        aspect-ratio: 4 / 5;
        object-fit: contain;
        object-position: center top;
        background:
          linear-gradient(180deg, #e3d6bf 0%, #f4ecdf 100%);
        padding: 16px;
      }
      .node-body {
        padding: 26px;
      }
      .node-kicker {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .context {
        font-size: 18px;
        line-height: 1.58;
        margin: 0 0 18px;
      }
      .dialogue-block {
        margin: 0 0 18px;
      }
      .speaker-label {
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .dialogue-quote {
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        font-size: clamp(28px, 4vw, 40px);
        line-height: 1.08;
        letter-spacing: -0.015em;
      }
      .section-copy {
        margin-bottom: 8px;
      }
      .flash {
        padding: 14px 16px;
        border-radius: 16px;
        margin-bottom: 18px;
        border: 1px solid transparent;
      }
      .flash.success {
        background: var(--ok-soft);
        border-color: rgba(31, 106, 67, 0.2);
      }
      .flash.warning {
        background: var(--warn-soft);
        border-color: rgba(138, 90, 0, 0.2);
      }
      .flash.neutral {
        background: #eef4f3;
        border-color: rgba(29, 92, 99, 0.18);
      }
      .flash-label {
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .choice-list,
      .audit-list,
      .detail-list,
      .stack {
        display: grid;
        gap: 12px;
      }
      .choice-button,
      .submit-button,
      .secondary-button {
        width: 100%;
        border: 0;
        border-radius: 18px;
        padding: 16px 18px;
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease;
      }
      .choice-button,
      .submit-button {
        background: var(--accent);
        color: white;
        box-shadow: 0 12px 24px rgba(29, 92, 99, 0.18);
        text-align: left;
      }
      .secondary-button {
        background: #efe5d8;
        color: var(--ink);
        width: auto;
      }
      .choice-button:hover,
      .submit-button:hover,
      .secondary-button:hover {
        transform: translateY(-1px);
      }
      .field {
        display: grid;
        gap: 8px;
      }
      .field label {
        font-weight: 700;
      }
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px 14px;
        background: white;
      }
      textarea {
        min-height: 130px;
        resize: vertical;
      }
      .field-error {
        color: #9b2c2c;
        font-size: 14px;
      }
      .required-evidence {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .evidence-pill {
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 14px;
      }
      .sidebar {
        padding: 20px;
        display: grid;
        gap: 16px;
        align-content: start;
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      .stat {
        padding: 12px;
        border-radius: 16px;
        background: #f6f0e8;
        border: 1px solid var(--line);
      }
      .stat-value {
        font-size: 28px;
        font-weight: 700;
        line-height: 1;
      }
      .small {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }
      .empty {
        color: var(--muted);
        font-style: italic;
      }
      .audit-hero {
        padding: 18px;
        border-radius: 20px;
      }
      .tone-exemplary_completion {
        background: linear-gradient(135deg, rgba(31,106,67,0.16), rgba(223,244,232,0.9));
      }
      .tone-pass_with_remediation {
        background: linear-gradient(135deg, rgba(138,90,0,0.14), rgba(255,243,214,0.9));
      }
      .tone-soft_fail {
        background: linear-gradient(135deg, rgba(155,44,44,0.12), rgba(255,236,236,0.92));
      }
      .tone-critical_fail {
        background: linear-gradient(135deg, rgba(110,22,22,0.18), rgba(255,226,226,0.96));
      }
      .audit-title {
        margin: 8px 0 10px;
        font-size: 28px;
        line-height: 1.05;
      }
      .error-panel {
        max-width: 900px;
        margin: 40px auto;
        padding: 24px;
      }
      .error-copy {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .hero {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <section class="panel error-panel">
        <p class="eyebrow">StormSim Scenario Player</p>
        <h1>Loading scenario…</h1>
      </section>
    </div>
    <script type="module" src="./app.js?v=20260411a"></script>
  </body>
</html>
