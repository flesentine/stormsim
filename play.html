<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StormSim Scenario Player</title>
    <style>
      :root {
        --bg: #eef2ee;
        --panel: rgba(255, 255, 255, 0.82);
        --panel-strong: #ffffff;
        --line: rgba(31, 49, 45, 0.1);
        --ink: #1c2725;
        --muted: #667674;
        --accent: #185b63;
        --accent-soft: #e3f0ef;
        --accent-strong: #0f444a;
        --warn: #8a5a00;
        --warn-soft: #fff3d6;
        --ok: #1f6a43;
        --ok-soft: #dff4e8;
        --shadow: 0 18px 60px rgba(19, 39, 37, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(24, 91, 99, 0.08), transparent 26%),
          radial-gradient(circle at top right, rgba(24, 91, 99, 0.08), transparent 24%),
          linear-gradient(180deg, #f8fbf7 0%, var(--bg) 100%);
      }
      button,
      select,
      textarea {
        font: inherit;
      }
      .shell {
        max-width: 1240px;
        margin: 0 auto;
        padding: 28px 24px 40px;
      }
      .hero {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: center;
        margin-bottom: 24px;
        padding: 22px 24px;
        backdrop-filter: blur(16px);
      }
      .eyebrow {
        margin: 0 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 12px;
        color: var(--muted);
      }
      h1 {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(28px, 4.5vw, 40px);
        line-height: 1.05;
        letter-spacing: -0.04em;
        font-weight: 750;
      }
      h2 {
        margin: 0 0 14px;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(22px, 3vw, 30px);
        line-height: 1.12;
        letter-spacing: -0.03em;
        font-weight: 700;
      }
      blockquote {
        margin: 0;
      }
      h3 {
        margin: 0 0 10px;
        font-size: 14px;
        line-height: 1.2;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }
      .hero-subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.5;
        max-width: 720px;
      }
      .hero-meta {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      .hero-actions {
        display: flex;
        align-items: center;
      }
      .pill {
        padding: 9px 13px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid var(--line);
        font-size: 13px;
        color: var(--ink);
      }
      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.75fr) minmax(300px, 0.9fr);
        gap: 20px;
        align-items: start;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: var(--shadow);
      }
      .main-card {
        overflow: hidden;
        backdrop-filter: blur(18px);
      }
      .node-image {
        width: 100%;
        display: block;
        aspect-ratio: 16 / 7;
        object-fit: cover;
        background: #e6ddd0;
      }
      .node-body {
        padding: 28px;
      }
      .section-label-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }
      .node-kicker {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .step-pill {
        padding: 7px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .context {
        font-size: 16px;
        line-height: 1.6;
        margin: 0 0 24px;
        color: #30403d;
      }
      .dialogue-block {
        margin: 0 0 18px;
        padding: 18px 20px;
        border-radius: 22px;
        background: linear-gradient(180deg, #ffffff 0%, #f6faf8 100%);
        border: 1px solid rgba(24, 91, 99, 0.1);
      }
      .speaker-label {
        margin-bottom: 8px;
        color: var(--accent-strong);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .dialogue-quote {
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(24px, 3.4vw, 34px);
        line-height: 1.12;
        letter-spacing: -0.04em;
        font-weight: 720;
      }
      .section-copy {
        margin-bottom: 8px;
      }
      .action-header {
        display: grid;
        gap: 6px;
        margin-bottom: 4px;
      }
      .action-title {
        font-size: 16px;
        font-weight: 700;
      }
      .flash {
        padding: 14px 16px;
        border-radius: 16px;
        margin-bottom: 18px;
        border: 1px solid transparent;
      }
      .flash.success {
        background: var(--ok-soft);
        border-color: rgba(31, 106, 67, 0.2);
      }
      .flash.warning {
        background: var(--warn-soft);
        border-color: rgba(138, 90, 0, 0.2);
      }
      .flash.neutral {
        background: #eef4f3;
        border-color: rgba(29, 92, 99, 0.18);
      }
      .flash-label {
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .choice-list,
      .audit-list,
      .detail-list,
      .stack {
        display: grid;
        gap: 12px;
      }
      .choice-button,
      .submit-button,
      .secondary-button {
        width: 100%;
        border-radius: 20px;
        padding: 18px 20px;
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease;
      }
      .choice-button,
      .submit-button {
        background: linear-gradient(180deg, #ffffff 0%, #f4faf9 100%);
        color: var(--ink);
        box-shadow: 0 10px 24px rgba(15, 68, 74, 0.08);
        text-align: left;
        border: 1px solid rgba(24, 91, 99, 0.12);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .secondary-button {
        background: rgba(24, 91, 99, 0.08);
        color: var(--ink);
        width: auto;
        border: 1px solid rgba(24, 91, 99, 0.08);
        padding: 14px 18px;
        font-weight: 600;
      }
      .choice-button:hover,
      .submit-button:hover,
      .secondary-button:hover {
        transform: translateY(-1px);
      }
      .choice-button:hover,
      .submit-button:hover {
        border-color: rgba(24, 91, 99, 0.24);
        box-shadow: 0 14px 28px rgba(15, 68, 74, 0.12);
      }
      .choice-text {
        font-size: 18px;
        line-height: 1.45;
        font-weight: 600;
      }
      .choice-arrow {
        flex: none;
        color: var(--accent-strong);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .field {
        display: grid;
        gap: 8px;
      }
      .field label {
        font-weight: 700;
      }
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px 14px;
        background: white;
      }
      textarea {
        min-height: 130px;
        resize: vertical;
      }
      .field-error {
        color: #9b2c2c;
        font-size: 14px;
      }
      .required-evidence {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .evidence-pill {
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 14px;
      }
      .sidebar {
        padding: 20px;
        display: grid;
        gap: 18px;
        align-content: start;
        backdrop-filter: blur(18px);
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      .stat {
        padding: 14px;
        border-radius: 18px;
        background: rgba(250, 252, 251, 0.92);
        border: 1px solid rgba(24, 91, 99, 0.1);
      }
      .stat-value {
        font-size: 32px;
        font-weight: 700;
        line-height: 1;
        margin-top: 8px;
      }
      .small {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }
      .empty {
        color: var(--muted);
        font-style: italic;
      }
      .audit-hero {
        padding: 20px;
        border-radius: 22px;
      }
      .tone-exemplary_completion {
        background: linear-gradient(135deg, rgba(31,106,67,0.16), rgba(223,244,232,0.9));
      }
      .tone-pass_with_remediation {
        background: linear-gradient(135deg, rgba(138,90,0,0.14), rgba(255,243,214,0.9));
      }
      .tone-soft_fail {
        background: linear-gradient(135deg, rgba(155,44,44,0.12), rgba(255,236,236,0.92));
      }
      .tone-critical_fail {
        background: linear-gradient(135deg, rgba(110,22,22,0.18), rgba(255,226,226,0.96));
      }
      .audit-title {
        margin: 8px 0 10px;
        font-size: 32px;
        line-height: 1.05;
        text-transform: none;
        letter-spacing: -0.03em;
        color: var(--ink);
      }
      .error-panel {
        max-width: 900px;
        margin: 40px auto;
        padding: 24px;
      }
      .error-copy {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .hero {
          flex-direction: column;
          align-items: flex-start;
        }
        .hero-actions {
          width: 100%;
        }
        .secondary-button {
          width: 100%;
        }
        .section-label-row {
          flex-direction: column;
          align-items: flex-start;
        }
        .choice-button,
        .submit-button {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <section class="panel error-panel">
        <p class="eyebrow">StormSim Scenario Player</p>
        <h1>Loading scenario…</h1>
      </section>
    </div>
    <script type="module" src="./app.js?v=20260410g"></script>
  </body>
</html>
