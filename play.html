<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StormSim Scenario Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #f4efe6;
        --surface: #fffaf2;
        --panel: rgba(255, 250, 242, 0.88);
        --panel-strong: #fffdf9;
        --line: rgba(71, 57, 34, 0.12);
        --ink: #1e2321;
        --muted: #6f756e;
        --accent: #0f5a63;
        --accent-soft: #dff0ef;
        --accent-strong: #093c42;
        --accent-dark: #12353a;
        --chip: #f4ebdc;
        --warn: #8a5a00;
        --warn-soft: #fff3d6;
        --ok: #1f6a43;
        --ok-soft: #dff4e8;
        --shadow: 0 30px 80px rgba(35, 28, 19, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Manrope", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 10%, rgba(15, 90, 99, 0.08), transparent 22%),
          radial-gradient(circle at 90% 0%, rgba(188, 153, 89, 0.10), transparent 20%),
          linear-gradient(180deg, #fbf7ef 0%, var(--bg) 100%);
      }
      button,
      select,
      textarea {
        font: inherit;
      }
      .shell {
        max-width: 1240px;
        margin: 0 auto;
        padding: 18px 24px 48px;
      }
      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 20px;
        align-items: start;
        margin-bottom: 22px;
        padding: 18px 20px;
        background:
          linear-gradient(135deg, rgba(255,255,255,0.72), rgba(255,250,242,0.92));
      }
      .eyebrow {
        margin: 0 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 11px;
        font-weight: 700;
        color: var(--muted);
      }
      h1 {
        margin: 0;
        font-family: "Manrope", ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(26px, 3.2vw, 34px);
        line-height: 1.02;
        letter-spacing: -0.05em;
        font-weight: 800;
        max-width: 720px;
      }
      h2 {
        margin: 0 0 14px;
        font-family: "Manrope", ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(20px, 2.2vw, 28px);
        line-height: 1.12;
        letter-spacing: -0.04em;
        font-weight: 700;
      }
      blockquote {
        margin: 0;
      }
      h3 {
        margin: 0 0 10px;
        font-size: 14px;
        line-height: 1.2;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }
      .hero-subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
        max-width: 640px;
      }
      .hero-meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      .hero-actions {
        display: flex;
        align-items: center;
      }
      .pill {
        padding: 9px 13px;
        border-radius: 999px;
        background: var(--chip);
        border: 1px solid var(--line);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: var(--ink);
      }
      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.65fr) minmax(300px, 0.95fr);
        gap: 18px;
        align-items: start;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 26px;
        box-shadow: var(--shadow);
      }
      .main-card {
        overflow: hidden;
        backdrop-filter: blur(20px);
      }
      .node-image {
        width: 100%;
        display: block;
        aspect-ratio: 16 / 6;
        object-fit: cover;
        background: #e6ddd0;
      }
      .node-body {
        padding: 24px;
      }
      .section-label-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      .node-kicker {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .step-pill {
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .context {
        font-size: 15px;
        line-height: 1.6;
        margin: 0 0 22px;
        color: #30403d;
        max-width: 70ch;
      }
      .dialogue-block {
        margin: 0 0 20px;
        padding: 0;
        border-radius: 0;
        background: transparent;
        border: 0;
      }
      .speaker-label {
        margin-bottom: 10px;
        color: var(--accent-strong);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .dialogue-quote {
        font-family: "Manrope", ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(28px, 3.6vw, 44px);
        line-height: 1.04;
        letter-spacing: -0.04em;
        font-weight: 800;
        max-width: 14ch;
      }
      .section-copy {
        margin-bottom: 8px;
      }
      .action-header {
        display: grid;
        gap: 6px;
        margin-bottom: 8px;
        padding-top: 6px;
        border-top: 1px solid rgba(71, 57, 34, 0.08);
      }
      .action-title {
        font-size: 15px;
        font-weight: 700;
      }
      .flash {
        padding: 14px 16px;
        border-radius: 16px;
        margin-bottom: 18px;
        border: 1px solid transparent;
      }
      .flash.success {
        background: var(--ok-soft);
        border-color: rgba(31, 106, 67, 0.2);
      }
      .flash.warning {
        background: var(--warn-soft);
        border-color: rgba(138, 90, 0, 0.2);
      }
      .flash.neutral {
        background: #eef4f3;
        border-color: rgba(29, 92, 99, 0.18);
      }
      .flash-label {
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .choice-list,
      .audit-list,
      .detail-list,
      .stack {
        display: grid;
        gap: 10px;
      }
      .choice-button,
      .submit-button,
      .secondary-button {
        width: 100%;
        border-radius: 18px;
        padding: 18px;
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease;
      }
      .choice-button,
      .submit-button {
        background: linear-gradient(180deg, #184f57 0%, #103d43 100%);
        color: #f8fcfb;
        box-shadow: 0 14px 28px rgba(16, 61, 67, 0.18);
        text-align: left;
        border: 1px solid rgba(9, 60, 66, 0.24);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .secondary-button {
        background: #efe5d4;
        color: var(--ink);
        width: auto;
        border: 1px solid rgba(71, 57, 34, 0.08);
        padding: 14px 18px;
        font-weight: 600;
      }
      .choice-button:hover,
      .submit-button:hover,
      .secondary-button:hover {
        transform: translateY(-1px);
      }
      .choice-button:hover,
      .submit-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 18px 34px rgba(16, 61, 67, 0.22);
      }
      .choice-index {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: 12px;
        background: rgba(255,255,255,0.12);
        color: rgba(255,255,255,0.9);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
      }
      .choice-text {
        flex: 1;
        font-size: 18px;
        line-height: 1.45;
        font-weight: 600;
      }
      .choice-arrow {
        flex: none;
        color: rgba(255,255,255,0.82);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .field {
        display: grid;
        gap: 8px;
      }
      .field label {
        font-weight: 700;
      }
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px 14px;
        background: white;
      }
      textarea {
        min-height: 130px;
        resize: vertical;
      }
      .field-error {
        color: #9b2c2c;
        font-size: 14px;
      }
      .required-evidence {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .evidence-pill {
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 14px;
      }
      .sidebar {
        padding: 20px;
        display: grid;
        gap: 14px;
        align-content: start;
        backdrop-filter: blur(18px);
      }
      .sidebar-section {
        padding: 14px;
        border-radius: 20px;
        background: rgba(255,255,255,0.52);
        border: 1px solid rgba(71, 57, 34, 0.06);
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      .stat {
        padding: 14px;
        border-radius: 16px;
        background: rgba(255,255,255,0.72);
        border: 1px solid rgba(71, 57, 34, 0.08);
      }
      .stat-value {
        font-size: 30px;
        font-weight: 800;
        line-height: 1;
        margin-top: 8px;
      }
      .small {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }
      .empty {
        color: var(--muted);
        font-style: italic;
      }
      .audit-hero {
        padding: 20px;
        border-radius: 22px;
      }
      .tone-exemplary_completion {
        background: linear-gradient(135deg, rgba(31,106,67,0.16), rgba(223,244,232,0.9));
      }
      .tone-pass_with_remediation {
        background: linear-gradient(135deg, rgba(138,90,0,0.14), rgba(255,243,214,0.9));
      }
      .tone-soft_fail {
        background: linear-gradient(135deg, rgba(155,44,44,0.12), rgba(255,236,236,0.92));
      }
      .tone-critical_fail {
        background: linear-gradient(135deg, rgba(110,22,22,0.18), rgba(255,226,226,0.96));
      }
      .audit-title {
        margin: 8px 0 10px;
        font-size: 32px;
        line-height: 1.05;
        text-transform: none;
        letter-spacing: -0.03em;
        color: var(--ink);
      }
      .error-panel {
        max-width: 900px;
        margin: 40px auto;
        padding: 24px;
      }
      .error-copy {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .hero {
          grid-template-columns: 1fr;
          align-items: flex-start;
        }
        .hero-actions {
          width: 100%;
        }
        .secondary-button {
          width: 100%;
        }
        .section-label-row {
          flex-direction: column;
          align-items: flex-start;
        }
        .choice-button,
        .submit-button {
          align-items: flex-start;
        }
        .dialogue-quote {
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <section class="panel error-panel">
        <p class="eyebrow">StormSim Scenario Player</p>
        <h1>Loading scenario…</h1>
      </section>
    </div>
    <script type="module" src="./app.js?v=20260410h"></script>
  </body>
</html>
